apiVersion: v1
kind: Secret
metadata:
  name: aineed-secrets
  namespace: aineed
type: Opaque
stringData:
  DATABASE_URL: "postgresql://aineed:${POSTGRES_PASSWORD}@postgres:5432/aineed"
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
  JWT_SECRET: "${JWT_SECRET}"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
  GLM_API_KEY: "${GLM_API_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: aineed
type: Opaque
stringData:
  POSTGRES_USER: "aineed"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: aineed
type: Opaque
stringData:
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: aineed
type: Opaque
stringData:
  MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
  MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
