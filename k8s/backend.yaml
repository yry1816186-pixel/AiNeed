apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aineed
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      initContainers:
        - name: run-migrations
          image: aineed/backend:latest
          command:
            - npx
            - prisma
            - migrate
            - deploy
          envFrom:
            - configMapRef:
                name: aineed-config
            - secretRef:
                name: aineed-secrets
      containers:
        - name: backend
          image: aineed/backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: aineed-config
            - secretRef:
                name: aineed-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aineed
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: aineed
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
