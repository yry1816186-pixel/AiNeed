apiVersion: v1
kind: ConfigMap
metadata:
  name: aineed-config
  namespace: aineed
data:
  NODE_ENV: "production"
  PORT: "3001"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://aineed.app,https://www.aineed.app"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "minio"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_BUCKET: "aineed"
  AI_SERVICE_URL: "http://ai-service:8000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: aineed
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
