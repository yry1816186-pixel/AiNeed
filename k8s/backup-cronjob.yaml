apiVersion: batch/v1
kind: CronJob
metadata:
  name: aineed-backup
  namespace: aineed
  labels:
    app.kubernetes.io/name: backup
    app.kubernetes.io/component: maintenance
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: backup-sa
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Starting backup at $(date)"
                  
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/aineed_${TIMESTAMP}.sql.gz"
                  
                  echo "Backing up PostgreSQL database..."
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    -h postgres \
                    -U "${POSTGRES_USER}" \
                    -d "${POSTGRES_DB}" \
                    --format=plain \
                    --no-owner \
                    --no-acl \
                    | gzip > "${BACKUP_FILE}"
                  
                  echo "PostgreSQL backup completed: ${BACKUP_FILE}"
                  
                  echo "Backing up Redis..."
                  REDISCLI_AUTH="${REDIS_PASSWORD}" redis-cli \
                    -h redis \
                    -p 6379 \
                    BGSAVE
                  
                  sleep 5
                  
                  echo "Uploading backups to S3..."
                  mc alias set backup-s3 "${S3_ENDPOINT}" "${AWS_ACCESS_KEY_ID}" "${AWS_SECRET_ACCESS_KEY}"
                  mc cp "${BACKUP_FILE}" "backup-s3/${S3_BUCKET}/postgres/"
                  
                  echo "Cleaning up old backups (retention: ${RETENTION_DAYS} days)..."
                  find /backups -name "*.sql.gz" -mtime +${RETENTION_DAYS} -delete
                  
                  echo "Backup completed at $(date)"
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  value: "aineed"
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: redis-credentials
                      key: REDIS_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: MINIO_ROOT_USER
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: MINIO_ROOT_PASSWORD
                - name: S3_ENDPOINT
                  value: "http://minio:9000"
                - name: S3_BUCKET
                  value: "aineed-backups"
                - name: RETENTION_DAYS
                  value: "30"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: aineed
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: aineed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-role
  namespace: aineed
rules:
  - apiGroups: [""]
    resources: ["pods", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-rolebinding
  namespace: aineed
subjects:
  - kind: ServiceAccount
    name: backup-sa
    namespace: aineed
roleRef:
  kind: Role
  name: backup-role
  apiGroup: rbac.authorization.k8s.io
