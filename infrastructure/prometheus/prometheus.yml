# ============================================================
# xuno 平台 Prometheus 主配置文件
# AI 驱动的私人形象定制平台 - 指标采集与告警配置
# ============================================================
# 网络环境: Docker ainetwork 桥接网络
# 服务发现: 静态配置 (Docker Compose 服务名作为主机名)
# ============================================================

# ----------------------------------------------------------
# 全局配置
# scrape_interval  : 指标采集间隔，15s 适合生产环境实时监控
# evaluation_interval: 告警规则评估间隔，与采集间隔保持一致
# scrape_timeout   : 单次采集超时，默认为采集间隔的 50%
# ----------------------------------------------------------
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  # 外部标签，用于联邦集群或远程写入时标识本实例
  external_labels:
    cluster: 'xuno-prod'
    environment: 'production'
    team: 'platform'

# ----------------------------------------------------------
# 告警管理器配置
# Alertmanager 负责告警去重、分组、路由和通知
# 部署在 ainetwork 网络中，端口 9093
# ----------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      timeout: 10s
      # API 版本指定为 v2（Alertmanager 0.17+）
      api_version: v2

# ----------------------------------------------------------
# 告警规则文件
# 按职责拆分为独立文件，便于维护和审查
# ----------------------------------------------------------
rule_files:
  - '/etc/prometheus/alerts/backend.yml'
  - '/etc/prometheus/alerts/ai.yml'
  - '/etc/prometheus/alerts/database.yml'
  - '/etc/prometheus/alerts/business.yml'

# ============================================================
# 采集目标配置
# 每个服务使用 Docker Compose 服务名作为主机名
# ============================================================
scrape_configs:

  # ----------------------------------------------------------
  # Prometheus 自身监控
  # 采集 Prometheus 服务端自身的运行指标
  # ----------------------------------------------------------
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          team: 'platform'
          env: 'production'

  # ----------------------------------------------------------
  # NestJS 后端服务
  # 容器名: stylemind-backend
  # 指标端点: /api/v1/metrics (Prometheus 格式)
  # 关键指标: HTTP 请求、数据库连接、Redis 缓存、业务计数器
  # ----------------------------------------------------------
  - job_name: 'backend'
    scrape_interval: 15s
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['backend:3001']
        labels:
          service: 'stylemind-backend'
          team: 'backend'
          env: 'production'
          tier: 'application'

  # ----------------------------------------------------------
  # Python AI 服务 (GLM API 封装层)
  # 容器名: stylemind-ai
  # 指标端点: /metrics (默认 Prometheus 格式)
  # 关键指标: AI 调用量、错误率、延迟、GPU 使用率
  # ----------------------------------------------------------
  - job_name: 'ai-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8002']
        labels:
          service: 'stylemind-ai'
          team: 'ai'
          env: 'production'
          tier: 'application'

  # ----------------------------------------------------------
  # GLM Virtual Try-On Service (via ai-service)
  # 容器名: stylemind-ai
  # 指标端点: /metrics
  # 关键指标: 试衣请求量、完成率、处理时长
  # ----------------------------------------------------------
  - job_name: 'glm-tryon'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8002']
        labels:
          service: 'stylemind-ai'
          team: 'ai'
          env: 'production'
          tier: 'application'

  # ----------------------------------------------------------
  # AI 任务 Worker (BullMQ 异步任务处理)
  # 容器名: stylemind-task-worker
  # 通过 Redis 暴露队列指标，或直接提供 /metrics 端点
  # 关键指标: 队列深度、处理速率、失败率
  # ----------------------------------------------------------
  - job_name: 'ai-task-worker'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-task-worker:8003']
        labels:
          service: 'stylemind-task-worker'
          team: 'ai'
          env: 'production'
          tier: 'application'

  # ----------------------------------------------------------
  # PostgreSQL Exporter
  # 容器名: stylemind-postgres-exporter
  # 采集 PostgreSQL 核心指标: 连接数、事务率、锁、复制延迟
  # ----------------------------------------------------------
  - job_name: 'postgres-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'stylemind-postgres-exporter'
          team: 'platform'
          env: 'production'
          tier: 'data'

  # ----------------------------------------------------------
  # Redis Exporter
  # 容器名: stylemind-redis-exporter
  # 采集 Redis 指标: 内存使用、命中率、连接数、键空间
  # ----------------------------------------------------------
  - job_name: 'redis-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'stylemind-redis-exporter'
          team: 'platform'
          env: 'production'
          tier: 'data'

  # ----------------------------------------------------------
  # Node Exporter (主机系统指标)
  # 容器名: stylemind-node-exporter
  # 采集: CPU、内存、磁盘、网络、文件系统等系统级指标
  # ----------------------------------------------------------
  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'stylemind-node-exporter'
          team: 'platform'
          env: 'production'
          tier: 'infrastructure'

  # ----------------------------------------------------------
  # cAdvisor (容器指标)
  # 容器名: stylemind-cadvisor
  # 采集: 容器 CPU、内存、网络 I/O、文件系统使用
  # 用于容器级别的资源监控和容量规划
  # ----------------------------------------------------------
  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'stylemind-cadvisor'
          team: 'platform'
          env: 'production'
          tier: 'infrastructure'
