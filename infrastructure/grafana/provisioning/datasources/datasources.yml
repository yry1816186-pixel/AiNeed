# ============================================================
# Grafana 数据源自动配置
# ============================================================
# Grafana 启动时自动加载以下数据源，无需手动配置
# 修改后需重启 Grafana 容器生效
# ============================================================

apiVersion: 1

# ----------------------------------------------------------
# 数据源列表
# ----------------------------------------------------------
datasources:
  # --------------------------------------------------
  # 1. Prometheus - 核心指标数据源
  # --------------------------------------------------
  # 存储所有服务的时序指标数据
  # 支持 PromQL 查询语言
  - name: 'Prometheus'
    type: 'prometheus'
    access: 'proxy'           # 通过 Grafana 后端代理访问
    url: 'http://prometheus:9090'
    isDefault: true           # 设为默认数据源
    editable: true            # 允许在 UI 中编辑
    jsonData:
      # Prometheus 查询超时
      timeInterval: '15s'
      # 自定义查询参数
      customQueryParameters: ''
      # 启用 POST 方法查询（支持大范围查询）
      httpMethod: 'POST'
    version: 1

  # --------------------------------------------------
  # 2. Loki - 日志数据源
  # --------------------------------------------------
  # 存储所有服务的容器日志
  # 支持 LogQL 查询语言，可与 Prometheus 指标关联查询
  - name: 'Loki'
    type: 'loki'
    access: 'proxy'
    url: 'http://loki:3100'
    editable: true
    jsonData:
      # 最大日志查询行数
      maxLines: 1000
      # 默认数据源（用于日志关联查询）
      derivedFields:
        # 将 traceID 从日志中提取，关联到 Jaeger（预留）
        - datasourceUid: 'jaeger'
          matcherRegex: '"trace_id":"(\w+)"'
          name: 'TraceID'
          url: '$${__value.raw}'
    version: 1

  # --------------------------------------------------
  # 3. PostgreSQL - 业务数据源
  # --------------------------------------------------
  # 直接查询业务数据库，用于业务指标仪表板
  # 如：用户注册量、订单量、收入等
  - name: 'PostgreSQL'
    type: 'postgres'
    access: 'proxy'
    url: 'postgres:5432'
    database: 'stylemind'
    user: 'postgres'
    # 密码从环境变量读取，避免明文存储
    secureJsonData:
      password: '${POSTGRES_PASSWORD}'
    editable: true
    jsonData:
      # PostgreSQL 连接参数
      sslmode: 'disable'       # Docker 内网通信无需 SSL
      # 连接池配置
      maxOpenConns: 5          # 最大打开连接数
      maxIdleConns: 2          # 最大空闲连接数
      connMaxLifetime: 14400   # 连接最大存活时间（秒）
      # PostgreSQL 版本
      postgresVersion: 1600    # 16.00
      # 时区设置
      timezone: 'Asia/Shanghai'
    version: 1

# ----------------------------------------------------------
# 数据源删除策略
# ----------------------------------------------------------
# deleteDatasources: 删除不在上述列表中的数据源
# 谨慎使用，避免删除手动创建的数据源
deleteDatasources:
  - name: 'Prometheus'
    orgId: 1
