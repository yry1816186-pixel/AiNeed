apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    root = file("../../")
    reactNativeDir = file("../../../../node_modules/react-native")
    cliFile = file("../../../../node_modules/react-native/cli.js")
    codegenDir = file("../../../../node_modules/@react-native/codegen")
    entryFile = file("../../index.js")
    hermesCommand = "../../node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true

def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.aineed.app'
    defaultConfig {
        applicationId 'com.aineed.app'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        // 🚀 ABI 过滤 - 仅打包 arm64-v8a（覆盖 99%+ 现代 Android 设备）
        // 预计减少 APK 30-40%（移除 armeabi-v7a, x86, x86_64 库）
        ndk {
            abiFilters 'arm64-v8a'
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def keystorePwd = System.getenv('AINEED_KEYSTORE_PASSWORD') ?: (project.hasProperty('RELEASE_STORE_PASSWORD') ? RELEASE_STORE_PASSWORD : null)
            def keyPwd = System.getenv('AINEED_KEY_PASSWORD') ?: (project.hasProperty('RELEASE_KEY_PASSWORD') ? RELEASE_KEY_PASSWORD : null)
            if (project.hasProperty('RELEASE_STORE_FILE')) {
                storeFile file(RELEASE_STORE_FILE)
                storePassword keystorePwd
                keyAlias RELEASE_KEY_ALIAS
                keyPassword keyPwd
            } else {
                storeFile file('aineed-release.keystore')
                storePassword keystorePwd
                keyAlias 'aineed'
                keyPassword keyPwd
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // 🚀 Debug 版也启用基础压缩（减小开发时 APK 体积）
            minifyEnabled false  // Debug 模式保持快速构建
            shrinkResources false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            // 🚀 启用资源压缩 - 移除未使用的资源（预计减少 APK 10-20%）
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
