# Prometheus Configuration for AiNeed
# 收集 NestJS 后端、Python AI 服务、PostgreSQL、Redis、Qdrant、MinIO 的指标

global:
  scrape_interval: 15s       # 默认抓取间隔
  evaluation_interval: 15s   # 规则评估间隔
  external_labels:
    monitor: 'aineed-monitor'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 告警规则文件
rule_files:
  - /etc/prometheus/alert.rules.yml

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # NestJS 后端服务
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3001']
    metrics_path: /metrics
    scheme: http

  # Python AI 服务
  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8001']
    metrics_path: /metrics
    scheme: http

  # PostgreSQL Exporter (需要安装 postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics

  # Redis Exporter (需要安装 redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: /metrics

  # Qdrant 向量数据库
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics

  # MinIO 对象存储
  # SECURITY: MinIO metrics endpoint requires authentication
  # Configure MINIO_ACCESS_KEY and MINIO_SECRET_KEY environment variables
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    basic_auth:
      username: ${MINIO_ACCESS_KEY}
      password: ${MINIO_SECRET_KEY}

  # Node Exporter (系统指标)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics

  # cAdvisor (容器指标)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
