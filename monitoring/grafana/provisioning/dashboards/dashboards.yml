# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'AiNeed Dashboards'
    orgId: 1
    folder: 'AiNeed'
    folderUid: 'aineed'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
