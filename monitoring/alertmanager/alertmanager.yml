global:
  resolve_timeout: 5m
  # SECURITY: Slack webhook URL must be configured via environment variable
  # If SLACK_WEBHOOK_URL is not set, Slack notifications will be disabled
  slack_api_url: ${SLACK_WEBHOOK_URL:-}

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Details:*
          {{ range .Labels.SortedPairs }} *{{ .Name }}:* {{ .Value }}
          {{ end }}
          {{ end }}

  - name: 'critical'
    slack_configs:
      - channel: '#critical-alerts'
        send_resolved: true
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt }}
          *Details:*
          {{ range .Labels.SortedPairs }} *{{ .Name }}:* {{ .Value }}
          {{ end }}
          {{ end }}
    # SECURITY: Email notifications require SMTP configuration via environment variables
    # Required: ALERT_EMAIL_RECIPIENT, ALERT_EMAIL_SENDER, SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
    # If any variable is missing, email notifications will fail silently
    email_configs:
      - to: ${ALERT_EMAIL_RECIPIENT:?ALERT_EMAIL_RECIPIENT is required for critical alerts}
        from: ${ALERT_EMAIL_SENDER:?ALERT_EMAIL_SENDER is required for critical alerts}
        smarthost: ${SMTP_HOST:?SMTP_HOST is required}:${SMTP_PORT:?SMTP_PORT is required}
        auth_username: ${SMTP_USERNAME:?SMTP_USERNAME is required}
        auth_password: ${SMTP_PASSWORD:?SMTP_PASSWORD is required}
        send_resolved: true

  - name: 'warning'
    slack_configs:
      - channel: '#warnings'
        send_resolved: true
        title: 'WARNING: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
