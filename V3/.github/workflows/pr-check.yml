name: PR Check

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - run: npm run lint

  backend-typecheck:
    name: Backend TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - run: npx prisma generate

      - run: npx tsc --noEmit

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aineed_test
          POSTGRES_USER: aineed
          POSTGRES_PASSWORD: aineed_test_2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aineed -d aineed_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://aineed:aineed_test_2026@localhost:5432/aineed_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://aineed:aineed_test_2026@localhost:5432/aineed_test

      - run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

  mobile-lint:
    name: Mobile Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - run: npx expo install --check

      - run: npm run lint
        continue-on-error: true

  mobile-typecheck:
    name: Mobile TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - run: npx expo install --check

      - run: npx tsc --noEmit

  commit-lint:
    name: Commit Message Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          VALID_PATTERN="^(feat|fix|refactor|chore|docs|style|test|perf|ci|build|revert)(\(.+\))?: .{1,100}"
          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:"%s")
          FAILED=0

          while IFS= read -r commit; do
            if [[ -n "$commit" ]]; then
              if ! echo "$commit" | grep -qE "$VALID_PATTERN"; then
                echo "::error::Invalid commit message: '$commit'"
                echo "Expected format: type(scope): description"
                echo "Valid types: feat, fix, refactor, chore, docs, style, test, perf, ci, build, revert"
                FAILED=1
              fi
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Commit message format check failed."
            echo "Please use: type(scope): description"
            echo "Example: feat(auth): add phone verification"
            exit 1
          fi

          echo "All commit messages follow the convention."

  sensitive-files-check:
    name: Sensitive Files Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for sensitive files
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD)
          SENSITIVE_PATTERNS=(".env" ".env." ".key" ".pem" ".p12" ".pfx" ".jks" ".keystore" "id_rsa" "id_ed25519" "credentials.json" "service-account.json")
          FOUND_SENSITIVE=0

          while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              for pattern in "${SENSITIVE_PATTERNS[@]}"; do
                if [[ "$file" == *"$pattern"* ]]; then
                  echo "::error::Sensitive file detected: '$file'"
                  FOUND_SENSITIVE=1
                fi
              done
            fi
          done <<< "$CHANGED_FILES"

          if [ "$FOUND_SENSITIVE" -eq 1 ]; then
            echo ""
            echo "Sensitive files detected in this PR."
            echo "Please remove: .env, .key, .pem, credentials files, etc."
            echo "Use GitHub Secrets or .env.example instead."
            exit 1
          fi

          echo "No sensitive files detected."

  pr-comment:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck, backend-test, mobile-lint, mobile-typecheck, commit-lint, sensitive-files-check]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate check summary
        id: summary
        run: |
          RESULTS=""
          declare -A JOBS=(
            ["Backend Lint"]="backend-lint"
            ["Backend TypeCheck"]="backend-typecheck"
            ["Backend Test"]="backend-test"
            ["Mobile Lint"]="mobile-lint"
            ["Mobile TypeCheck"]="mobile-typecheck"
            ["Commit Format"]="commit-lint"
            ["Sensitive Files"]="sensitive-files-check"
          )

          for name in "${!JOBS[@]}"; do
            JOB_ID="${JOBS[$name]}"
            STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
              --jq ".jobs[] | select(.name == \"$name\") | .conclusion" 2>/dev/null || echo "unknown")

            if [ -z "$STATUS" ]; then
              STATUS="pending"
            fi

            case "$STATUS" in
              success) ICON="✅" ;;
              failure) ICON="❌" ;;
              cancelled) ICON="⚪" ;;
              *) ICON="⏳" ;;
            esac

            RESULTS="$RESULTS\n$ICON $name: ${STATUS^}"
          done

          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const results = `${{ steps.summary.outputs.results }}`;
            const body = `## 🔍 PR Check Results\n\n${results}\n\n---\n*Triggered by commit \`${context.sha.substring(0, 7)}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Check Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
