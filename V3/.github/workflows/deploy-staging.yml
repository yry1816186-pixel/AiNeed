name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=staging

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            cd ${{ secrets.STAGING_APP_DIR }}

            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_TAG=staging-${{ github.sha }}
            export DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}"
            export REDIS_URL="${{ secrets.STAGING_REDIS_URL }}"
            export JWT_SECRET="${{ secrets.STAGING_JWT_SECRET }}"
            export JWT_ACCESS_EXPIRES_IN=15m
            export JWT_REFRESH_EXPIRES_IN=7d
            export MINIO_ENDPOINT="${{ secrets.STAGING_MINIO_ENDPOINT }}"
            export MINIO_PORT="${{ secrets.STAGING_MINIO_PORT }}"
            export MINIO_ACCESS_KEY="${{ secrets.STAGING_MINIO_ACCESS_KEY }}"
            export MINIO_SECRET_KEY="${{ secrets.STAGING_MINIO_SECRET_KEY }}"
            export MINIO_BUCKET=aineed
            export ZHIPU_API_KEY="${{ secrets.STAGING_ZHIPU_API_KEY }}"
            export ZHIPU_MODEL=glm-5
            export QDRANT_URL="${{ secrets.STAGING_QDRANT_URL }}"
            export NEO4J_URL="${{ secrets.STAGING_NEO4J_URL }}"
            export NEO4J_USER="${{ secrets.STAGING_NEO4J_USER }}"
            export NEO4J_PASSWORD="${{ secrets.STAGING_NEO4J_PASSWORD }}"
            export ELASTICSEARCH_URL="${{ secrets.STAGING_ELASTICSEARCH_URL }}"
            export APP_PORT=3001
            export APP_ENV=staging
            export CORS_ORIGIN="${{ secrets.STAGING_CORS_ORIGIN }}"

            echo "$REGISTRY_PASSWORD" | docker login $REGISTRY -u "$REGISTRY_USER" --password-stdin

            docker compose pull backend
            docker compose up -d --remove-orphans

            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "Backend is healthy"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Backend health check failed"
                docker compose logs --tail=50 backend
                exit 1
              fi
              sleep 2
            done

            docker image prune -f
          envs: REGISTRY_PASSWORD,REGISTRY_USER
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
