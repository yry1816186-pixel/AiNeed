name: Deploy Production

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=production-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Run database migrations
        working-directory: apps/backend
        run: |
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  deploy:
    name: Rolling Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Record pre-deploy state
        id: pre_deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}
            CURRENT_IMAGE=$(docker compose images -q backend 2>/dev/null || echo "none")
            echo "current_image=$CURRENT_IMAGE" >> $GITHUB_OUTPUT
            echo "Current backend image: $CURRENT_IMAGE"

      - name: Deploy via SSH (rolling update)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}

            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.version }}
            export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            export REDIS_URL="${{ secrets.PROD_REDIS_URL }}"
            export JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}"
            export JWT_ACCESS_EXPIRES_IN=15m
            export JWT_REFRESH_EXPIRES_IN=7d
            export MINIO_ENDPOINT="${{ secrets.PROD_MINIO_ENDPOINT }}"
            export MINIO_PORT="${{ secrets.PROD_MINIO_PORT }}"
            export MINIO_ACCESS_KEY="${{ secrets.PROD_MINIO_ACCESS_KEY }}"
            export MINIO_SECRET_KEY="${{ secrets.PROD_MINIO_SECRET_KEY }}"
            export MINIO_BUCKET=aineed
            export ZHIPU_API_KEY="${{ secrets.PROD_ZHIPU_API_KEY }}"
            export ZHIPU_MODEL=glm-5
            export DEEPSEEK_API_KEY="${{ secrets.PROD_DEEPSEEK_API_KEY }}"
            export QDRANT_URL="${{ secrets.PROD_QDRANT_URL }}"
            export NEO4J_URL="${{ secrets.PROD_NEO4J_URL }}"
            export NEO4J_USER="${{ secrets.PROD_NEO4J_USER }}"
            export NEO4J_PASSWORD="${{ secrets.PROD_NEO4J_PASSWORD }}"
            export ELASTICSEARCH_URL="${{ secrets.PROD_ELASTICSEARCH_URL }}"
            export SMS_PROVIDER=aliyun
            export ALIYUN_SMS_ACCESS_KEY="${{ secrets.PROD_ALIYUN_SMS_ACCESS_KEY }}"
            export ALIYUN_SMS_SECRET_KEY="${{ secrets.PROD_ALIYUN_SMS_SECRET_KEY }}"
            export ALIYUN_SMS_SIGN_NAME="${{ secrets.PROD_ALIYUN_SMS_SIGN_NAME }}"
            export ALIYUN_SMS_TEMPLATE_CODE="${{ secrets.PROD_ALIYUN_SMS_TEMPLATE_CODE }}"
            export POD_PROVIDER=eprolo
            export POD_API_KEY="${{ secrets.PROD_POD_API_KEY }}"
            export POD_API_URL="${{ secrets.PROD_POD_API_URL }}"
            export OUTFIT_IMAGE_API_PROVIDER=zhipu
            export OUTFIT_IMAGE_API_KEY="${{ secrets.PROD_OUTFIT_IMAGE_API_KEY }}"
            export OUTFIT_IMAGE_API_URL="${{ secrets.PROD_OUTFIT_IMAGE_API_URL }}"
            export APP_PORT=3001
            export APP_ENV=production
            export CORS_ORIGIN="${{ secrets.PROD_CORS_ORIGIN }}"
            export CDN_BASE_URL="${{ secrets.PROD_CDN_BASE_URL }}"
            export RATE_LIMIT_TTL=60
            export RATE_LIMIT_MAX=100
            export SENTRY_DSN="${{ secrets.PROD_SENTRY_DSN }}"

            echo "$REGISTRY_PASSWORD" | docker login $REGISTRY -u "$REGISTRY_USER" --password-stdin

            docker compose pull backend

            docker compose up -d --no-deps --scale backend=2 backend

            echo "Waiting for new backend instance to be healthy..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "New backend instance is healthy"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Health check failed after 120s, initiating rollback..."
                docker compose up -d --no-deps --scale backend=1 backend
                exit 1
              fi
              sleep 2
            done

            docker compose up -d --no-deps --scale backend=1 backend

            echo "Waiting for final backend instance to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                echo "Production deployment successful"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Final health check failed"
                docker compose logs --tail=100 backend
                exit 1
              fi
              sleep 2
            done

            docker image prune -f
          envs: REGISTRY_PASSWORD,REGISTRY_USER
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}
            HEALTH=$(curl -sf http://localhost:3001/api/v1/health 2>/dev/null || echo "failed")
            if [ "$HEALTH" = "failed" ]; then
              echo "Post-deploy health check failed!"
              exit 1
            fi
            echo "Post-deploy health check passed: $HEALTH"

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: production
    steps:
      - name: Execute rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}

            PREVIOUS_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "backend" | head -n 2 | tail -n 1)

            if [ -n "$PREVIOUS_IMAGE" ]; then
              echo "Rolling back to previous image: $PREVIOUS_IMAGE"
              export IMAGE_TAG="$PREVIOUS_IMAGE"
              docker compose up -d --no-deps backend

              echo "Waiting for rollback to stabilize..."
              sleep 10

              for i in $(seq 1 30); do
                if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
                  echo "Rollback successful - backend is healthy"
                  exit 0
                fi
                sleep 2
              done

              echo "Rollback health check failed - manual intervention required"
              exit 1
            else
              echo "No previous image found for rollback - manual intervention required"
              exit 1
            fi

      - name: Notify rollback
        if: always()
        run: |
          echo "::warning::Production deployment failed and rollback was triggered."
          echo "Version ${{ needs.build-and-push.outputs.version }} deployment failed."
          echo "Please verify the production environment manually."
