services:
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: aineed-backend
    restart: always
    entrypoint: ["/app/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql://aineed:${POSTGRES_PASSWORD}@postgres:5432/aineed_prod
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: aineed
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      ZHIPU_MODEL: ${ZHIPU_MODEL:-glm-5}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      SMS_PROVIDER: ${SMS_PROVIDER}
      ALIYUN_SMS_ACCESS_KEY: ${ALIYUN_SMS_ACCESS_KEY}
      ALIYUN_SMS_SECRET_KEY: ${ALIYUN_SMS_SECRET_KEY}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE}
      WECHAT_PAY_APP_ID: ${WECHAT_PAY_APP_ID}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID}
      WECHAT_PAY_API_KEY: ${WECHAT_PAY_API_KEY}
      WECHAT_PAY_CERT_PATH: ${WECHAT_PAY_CERT_PATH}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL}
      EMBEDDING_SERVICE_URL: http://embedding-service:8003
      BODY_ANALYSIS_URL: http://body-analysis:8004
      OUTFIT_IMAGE_API_PROVIDER: ${OUTFIT_IMAGE_API_PROVIDER:-zhipu}
      OUTFIT_IMAGE_API_KEY: ${OUTFIT_IMAGE_API_KEY}
      OUTFIT_IMAGE_API_URL: ${OUTFIT_IMAGE_API_URL}
      POD_PROVIDER: ${POD_PROVIDER:-eprolo}
      POD_API_KEY: ${POD_API_KEY}
      POD_API_URL: ${POD_API_URL}
      APP_PORT: 3001
      APP_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://aineed.com}
      CDN_BASE_URL: ${CDN_BASE_URL:-https://cdn.aineed.com}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - aineed-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aineed-postgres
    restart: always
    environment:
      POSTGRES_DB: aineed_prod
      POSTGRES_USER: aineed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aineed -d aineed_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - aineed-net

  redis:
    image: redis:7-alpine
    container_name: aineed-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - aineed-net

  minio:
    image: minio/minio:latest
    container_name: aineed-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - aineed-net

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: aineed-qdrant
    restart: always
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - aineed-net

  neo4j:
    image: neo4j:5-community
    container_name: aineed-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - aineed-net

  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: aineed-elasticsearch
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - aineed-net

  nginx:
    image: nginx:1.27-alpine
    container_name: aineed-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/ssl.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    networks:
      - aineed-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  es_data:
  nginx_logs:

networks:
  aineed-net:
    driver: bridge
