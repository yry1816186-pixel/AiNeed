services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3001}:3001"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./src:/app/src
    networks:
      - aineed-network

  postgres:
    extends:
      file: ../../docker/docker-compose.yml
      service: postgres

  redis:
    extends:
      file: ../../docker/docker-compose.yml
      service: redis

  minio:
    extends:
      file: ../../docker/docker-compose.yml
      service: minio

networks:
  aineed-network:
    external: true
    name: aineed-network
